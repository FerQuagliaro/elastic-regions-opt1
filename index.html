<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#fff;color:#1a1a1a;font-size:14px}
.page{max-width:1100px;margin:0 auto;padding:24px 20px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{color:#555;margin-bottom:16px;font-size:13px}
.tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab{border:1px solid #ddd;background:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;color:#555;transition:all .15s}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tab:hover:not(.on){background:#f5f5f5}
.announce{background:#FFF8E1;border:1px solid #FFD740;border-radius:6px;padding:9px 14px;margin-bottom:10px;font-size:12.5px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.new-badge{background:#FF5722;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:1px}
.toolbar{display:flex;align-items:center;margin-bottom:8px}
.checks{display:flex;gap:16px}
.chk{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:#555}
.chk input{width:14px;height:14px;cursor:pointer}
.layout{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;height:520px}
.sidebar{width:320px;flex-shrink:0;border-right:1px solid #ddd;overflow-y:auto;background:#fff}
.map-wrap{flex:1;position:relative;background:#EEF1F7;overflow:hidden}
#map-svg{width:100%;height:100%;cursor:grab;display:block;user-select:none}
#map-svg.drag{cursor:grabbing}
.map-ctrls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px}
.map-ctrls button{width:30px;height:30px;border:1px solid #ccc;background:#fff;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;line-height:1}
.map-ctrls button:hover{background:#f5f5f5}
.acc-group{border-bottom:1px solid #eee}
.acc-head{width:100%;text-align:left;padding:10px 14px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;color:#1a1a1a}
.acc-head:hover{background:#f9f9f9}
.acc-chevron{font-size:16px;transition:transform .2s;display:inline-block}
.acc-chevron.open{transform:rotate(0deg)}
.acc-chevron:not(.open){transform:rotate(-90deg)}
.acc-body{display:none}
.acc-body.open{display:block}
.region-row{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 24px;cursor:pointer;font-size:13px;color:#333}
.region-row:hover{background:#f5f5f5}
.region-row.active{background:#EEF1F7;font-weight:600}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stag{margin-left:auto;font-size:10px;background:#E3F2FD;color:#1565C0;padding:1px 6px;border-radius:10px;font-weight:500}
.tip{position:absolute;background:#0d1520;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:0;box-shadow:0 16px 40px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);pointer-events:none;display:none;z-index:100;width:220px;overflow:hidden}
.tip.sticky{pointer-events:all}
.tip-head{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 14px 0}
.tip-city{font-weight:700;font-size:14px;color:#fff;line-height:1.25;display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.tip-city-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tip-close{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:18px;line-height:1;padding:0;margin:-2px -2px 0 8px;flex-shrink:0;transition:color .15s}
.tip-close:hover{color:rgba(255,255,255,.8)}
.tip-region{font-size:10.5px;color:rgba(255,255,255,.38);font-family:monospace;padding:3px 14px 10px;letter-spacing:.02em}
.tip-body{padding:0 14px 14px}
.tip-divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:0 0 10px}
.tip-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:4px}
.tip-row-label{color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.07em;font-weight:600;font-size:10px}
.tip-row-val{color:rgba(255,255,255,.8);font-weight:500;display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.tip-pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tip-pchip{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.8)}
.tip-sl-badge{font-size:8.5px;background:rgba(37,99,235,.25);color:#93c5fd;padding:1px 5px;border-radius:5px;font-weight:600;flex-shrink:0}
.tip-cycle{font-size:9px;color:rgba(255,255,255,.3);font-weight:500;white-space:nowrap;padding:2px 6px;background:rgba(255,255,255,.06);border-radius:4px;cursor:pointer}
@keyframes pinIn{from{opacity:0}to{opacity:1}}
#markers>g{filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));animation:pinIn .28s ease-out both}
@media(max-width:700px){.layout{flex-direction:column;height:auto}.sidebar{width:100%;height:250px;border-right:none;border-bottom:1px solid #ddd}.map-wrap{height:320px}}
:focus-visible{outline:2px solid #0057b8;outline-offset:2px;border-radius:3px}
.tab:focus-visible{outline-offset:3px}
.region-row:focus-visible{outline-offset:-2px}
#cluster-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.cpin-wrap{position:absolute;pointer-events:none}
.cpin{width:26px;height:26px;border-radius:50%;background:rgba(13,21,32,0.88);border:1.5px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;
  transform:translate(-50%,-50%);cursor:pointer;pointer-events:all;
  box-shadow:0 4px 16px rgba(0,0,0,.4),0 1px 4px rgba(0,0,0,.3);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s;font-family:inherit;
  position:absolute;left:0;top:0;backdrop-filter:blur(4px)}
.cpin:hover{background:rgba(37,99,235,.85);border-color:rgba(255,255,255,.35);transform:translate(-50%,-50%) scale(1.18)}
.cpin-label{position:absolute;top:17px;left:0;transform:translateX(-50%);white-space:nowrap;
  font-size:9.5px;color:rgba(40,55,80,.85);font-weight:600;font-family:inherit;pointer-events:none;
  background:rgba(255,255,255,0.82);border-radius:4px;padding:1px 5px;
  opacity:0;transition:opacity .15s}
.cpin-wrap:hover .cpin-label{opacity:1}
@keyframes cpinIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.3)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes svgPinIn{from{opacity:0}to{opacity:1}}
.pin-g.pin-active .pin-shape{stroke:rgba(255,255,255,0.8)!important;stroke-width:0.9!important}
.pin-g .pin-lbl{opacity:0;transition:opacity .15s}
.pin-g:hover .pin-lbl,.pin-g.pin-active .pin-lbl{opacity:1}
#back-btn{position:absolute;top:12px;left:12px;display:none;background:#fff;border:1px solid #ddd;
  border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:#333;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:10;font-family:inherit}
#back-btn:hover{background:#f5f5f5}
#map-legend{position:absolute;bottom:52px;left:12px;background:rgba(255,255,255,0.92);border:1px solid rgba(0,0,0,0.07);border-radius:10px;padding:8px 11px;font-size:11px;color:#2d3748;font-family:inherit;pointer-events:none;z-index:10;backdrop-filter:blur(6px);box-shadow:0 2px 8px rgba(0,0,0,0.08);line-height:1}
.leg-row{display:flex;align-items:center;gap:6px;padding:2.5px 0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-sep{border-top:1px solid rgba(0,0,0,0.08);margin:4px 0}
.leg-lam{font-size:11px;font-weight:700;width:8px;text-align:center;color:#6b7ea8}
</style>

  {id:'us-central',name:'US Central',    lat:41.8, lng:-93.1, zoom:4.0, regions:['us-central1']},
  {id:'canada',    name:'Canada',        lat:48.3, lng:-93.5, zoom:2.8, regions:['ca-central-1','ca-west-1']},
  {id:'south-am',  name:'South America', lat:-23.5,lng:-46.6, zoom:4.0, regions:['sa-east-1']},
  {id:'uk-ire',    name:'UK & Ireland',  lat:52.4, lng:-3.2,  zoom:4.0, regions:['eu-west-1','eu-west-2']},
  {id:'c-europe',  name:'Central Europe',lat:48.5, lng:6.5,   zoom:3.2, regions:['eu-west-3','eu-central-1','eu-central-2','eu-south-1']},
  {id:'n-europe',  name:'N. Europe',     lat:59.3, lng:18.1,  zoom:4.0, regions:['eu-north-1']},
  {id:'mideast',   name:'Middle East',   lat:24.8, lng:54.8,  zoom:4.0, regions:['me-central-1','uaenorth']},
  {id:'africa',    name:'Africa',        lat:-33.9,lng:18.4,  zoom:4.0, regions:['af-south-1']},
  {id:'se-asia',   name:'SE Asia',       lat:-2.5, lng:105.3, zoom:3.5, regions:['ap-southeast-1','ap-southeast-3']},
  {id:'australia', name:'Australia',     lat:-33.9,lng:151.2, zoom:4.0, regions:['ap-southeast-2']},
  {id:'ne-asia',   name:'NE Asia',       lat:33.0, lng:130.0, zoom:2.8, regions:['ap-northeast-1','ap-northeast-2','ap-east-1']},
  {id:'s-asia',    name:'S. Asia',       lat:19.1, lng:72.9,  zoom:4.0, regions:['ap-south-1']},
];
const SHORT={aws:'AWS',gcp:'GCP',azure:'Az'};
let expandedCluster=null;
let groupOf={};     /* key → array of {r,p,key} entries that overlap this pin */
let renderPos={};   /* key → [mx, my] spread offset for overlapping pins */

/* ── View state ── */
const VW=800,VH=500;
const GEO_VIEWS={
  global:  {cx:400.0,cy:250.0,s:1.00},
  americas:{cx:245.6,cy:220.1,s:2.20},
  emea:    {cx:437.5,cy:118.0,s:2.50},
  apac:    {cx:684.2,cy:205.4,s:2.00}
};
let curTx=0,curTy=0,curSc=1,tgtTx=0,tgtTy=0,tgtSc=1,animRaf=null;
let activeTab='global',activeRegion=null,showSL=true,showHosted=true;
let dragStart=null,dragTxO,dragTyO,wasDragging=false;
let stickyTip=null;
let _pinClicked=false;let _lastClickMs=0;

const svg=document.getElementById('map-svg');
const worldG=document.getElementById('world-g');
const marksG=document.getElementById('markers');
const tipEl=document.getElementById('tip');
const mapWrap=document.getElementById('map-wrap');

/* ── Animation ── */
function applyT(){worldG.setAttribute('transform','translate('+curTx+','+curTy+') scale('+curSc+')');positionClusterPins();}
function animStep(){
  const dx=tgtTx-curTx,dy=tgtTy-curTy,ds=tgtSc-curSc;
  if(Math.abs(dx)<0.08&&Math.abs(dy)<0.08&&Math.abs(ds)<0.0004){
    curTx=tgtTx;curTy=tgtTy;curSc=tgtSc;applyT();animRaf=null;return;
  }
  curTx+=dx*0.16;curTy+=dy*0.16;curSc+=ds*0.16;applyT();
  animRaf=requestAnimationFrame(animStep);
}
function moveTo(tx,ty,sc,anim){
  tgtTx=tx;tgtTy=ty;tgtSc=sc;
  if(!anim){curTx=tx;curTy=ty;curSc=sc;applyT();if(animRaf){cancelAnimationFrame(animRaf);animRaf=null;}return;}
  if(!animRaf)animRaf=requestAnimationFrame(animStep);
}
function flyTo(geo){
  const v=GEO_VIEWS[geo];
  moveTo(VW/2-v.cx*v.s,VH/2-v.cy*v.s,v.s,true);
}

/* ── SVG coordinate helper ── */
function svgPt(e){
  const rect=svg.getBoundingClientRect();
  const sa=VW/VH,ra=rect.width/rect.height;
  let sc,ox=0,oy=0;
  if(ra>sa){sc=VH/rect.height;ox=(rect.width-VW/sc)/2;}
  else{sc=VW/rect.width;oy=(rect.height-VH/sc)/2;}
  return[(e.clientX-rect.left-ox)*sc,(e.clientY-rect.top-oy)*sc];
}

/* ── Markers ── */
function filteredRegions(){
  return REGIONS.filter(r=>{
    if(activeTab!=='global'&&r.geo!==activeTab)return false;
    if(r.sl&&!showSL)return false;
    if(!r.sl&&!showHosted)return false;
    return true;
  });
}
/* ── Cluster helpers ── */
function svgToMap(mx,my){
  const pt=svg.createSVGPoint();pt.x=mx;pt.y=my;
  const s=pt.matrixTransform(worldG.getScreenCTM());
  const r=mapWrap.getBoundingClientRect();
  return[s.x-r.left,s.y-r.top];
}
function getFilteredClusters(){
  return CLUSTERS.map(c=>({
    ...c,
    regions:c.regions.filter(id=>{
      const r=REGIONS.find(x=>x.id===id);
      if(!r)return false;
      if(activeTab!=='global'&&r.geo!==activeTab)return false;
      if(r.sl&&!showSL)return false;
      if(!r.sl&&!showHosted)return false;
      return true;
    })
  })).filter(c=>c.regions.length>0);
}
function positionClusterPins(){
  if(expandedCluster!==null)return;
  const layer=document.getElementById('cluster-layer');
  if(!layer)return;
  layer.querySelectorAll('.cpin-wrap').forEach(el=>{
    const mx=parseFloat(el.dataset.mx),my=parseFloat(el.dataset.my);
    const[px,py]=svgToMap(mx,my);
    el.style.left=px+'px';el.style.top=py+'px';
  });
}
function renderClusterLayer(){
  const layer=document.getElementById('cluster-layer');
  if(!layer)return;
  layer.innerHTML='';
  if(expandedCluster!==null){layer.style.display='none';return;}
  layer.style.display='';
  getFilteredClusters().forEach((cl,i)=>{
    const[mx,my]=project([cl.lng,cl.lat]);
    const[px,py]=svgToMap(mx,my);
    const wrap=document.createElement('div');
    wrap.className='cpin-wrap';wrap.dataset.mx=mx;wrap.dataset.my=my;
    wrap.style.left=px+'px';wrap.style.top=py+'px';
    const btn=document.createElement('div');
    btn.className='cpin';btn.textContent=String(cl.regions.length);
    btn.title=cl.name;
    btn.style.animation=`cpinIn .32s ease-out ${i*0.04}s both`;
    const lbl=document.createElement('div');
    lbl.className='cpin-label';lbl.textContent=cl.name;
    wrap.appendChild(btn);wrap.appendChild(lbl);
    btn.addEventListener('click',e=>{e.stopPropagation();expandCluster(cl);});
    layer.appendChild(wrap);
  });
}
function expandCluster(cl){
  expandedCluster=cl.id;
  const[mx,my]=project([cl.lng,cl.lat]);
  moveTo(VW/2-mx*cl.zoom,VH/2-my*cl.zoom,cl.zoom,true);
  document.getElementById('cluster-layer').style.display='none';
  document.getElementById('back-btn').style.display='block';
  renderMarkers();
}
function collapseToGlobal(){
  expandedCluster=null;stickyTip=null;hideTip();activeRegion=null;
  document.getElementById('back-btn').style.display='none';
  flyTo(activeTab);
  renderMarkers();renderSidebar();
  renderClusterLayer();
}

function setActivePinClass(rid){
  marksG.querySelectorAll('.pin-active').forEach(el=>el.classList.remove('pin-active'));
  if(rid){
    const el=marksG.querySelector('[data-rid="'+rid+'"]');
    if(el){el.classList.add('pin-active');marksG.appendChild(el);} // move to end = renders on top
  }
}
function makeMarker(r,p,key){
  const _base=project([r.lng,r.lat]);
  const[mx,my]=renderPos[key]||_base;
  const ns='http://www.w3.org/2000/svg';
  const g=document.createElementNS(ns,'g');
  g.setAttribute('transform','translate('+mx.toFixed(2)+','+my.toFixed(2)+')');
  g.setAttribute('class','pin-g');g.setAttribute('data-rid',key);
  g.setAttribute('tabindex','0');g.setAttribute('role','button');
  g.setAttribute('aria-label',r.name+' ('+PROVIDERS[p].short+')');g.style.cursor='pointer';g.style.outline='none';
  g.setAttribute('pointer-events','all');
  /* ── teardrop: circle r=7 center(0,-11), tip at (0,0) ── */
  const mainColor=r.sl?PROVIDERS[p].slColor:PROVIDERS[p].color;
  const strokeColor=PROVIDERS[p].color;
  /* shadow */
  const shad=document.createElementNS(ns,'ellipse');
  shad.setAttribute('cx','0');shad.setAttribute('cy','0.5');shad.setAttribute('rx','2');shad.setAttribute('ry','0.8');
  shad.setAttribute('fill','rgba(0,0,0,0.18)');shad.setAttribute('pointer-events','none');
  g.appendChild(shad);
  /* teardrop: r=3.5, center(0,-6) — compact, clean */
  const shape=document.createElementNS(ns,'path');
  shape.setAttribute('d','M0,0 L-2.8,-2.0 A3.5,3.5 0 1,1 2.8,-2.0Z');
  shape.setAttribute('class','pin-shape');
  shape.setAttribute('fill',mainColor);
  shape.setAttribute('stroke',strokeColor);shape.setAttribute('stroke-width','0.6');
  shape.setAttribute('stroke-linejoin','round');shape.setAttribute('pointer-events','none');
  shape.setAttribute('filter','drop-shadow(0 1px 2px rgba(0,0,0,0.2))');
  g.appendChild(shape);
  /* label — subtle pill, hover/active only */
  const lblText=PROVIDERS[p].short+(r.sl?' λ':'');
  const fs=2.9, lh=4.8, lpad=3.5;
  const lw=Math.max(10, lblText.length*fs*0.6+lpad*2);
  const ly=-6-3.5-lh+0.5;
  const lbl=document.createElementNS(ns,'g');
  lbl.setAttribute('class','pin-lbl');
  lbl.setAttribute('pointer-events','none');
  const lbg=document.createElementNS(ns,'rect');
  lbg.setAttribute('x',String(-lw/2));lbg.setAttribute('y',String(ly));
  lbg.setAttribute('width',String(lw));lbg.setAttribute('height',String(lh));
  lbg.setAttribute('rx','2.4');
  lbg.setAttribute('fill','rgba(8,18,36,0.40)');
  lbg.setAttribute('stroke','rgba(255,255,255,0.18)');lbg.setAttribute('stroke-width','0.4');
  lbl.appendChild(lbg);
  const lbt=document.createElementNS(ns,'text');
  lbt.setAttribute('x','0');lbt.setAttribute('y',String(ly+lh/2));
  lbt.setAttribute('text-anchor','middle');lbt.setAttribute('dominant-baseline','middle');
  lbt.setAttribute('fill','rgba(225,235,250,0.92)');lbt.setAttribute('font-size',String(fs));
  lbt.setAttribute('font-family','system-ui,sans-serif');lbt.setAttribute('font-weight','500');
  lbt.setAttribute('letter-spacing','0.2');
  lbt.textContent=lblText;
  lbl.appendChild(lbt);
  g.appendChild(lbl);



  /* serverless: tiny λ inside the pin body */
  if(r.sl){
    const slMark=document.createElementNS(ns,'text');
    slMark.setAttribute('x','0');slMark.setAttribute('y','-5.8');
    slMark.setAttribute('text-anchor','middle');slMark.setAttribute('dominant-baseline','middle');
    slMark.setAttribute('fill','rgba(255,255,255,0.72)');slMark.setAttribute('font-size','2.8');
    slMark.setAttribute('font-family','system-ui,sans-serif');slMark.setAttribute('font-weight','700');
    slMark.setAttribute('pointer-events','none');
    slMark.textContent='λ';
    g.appendChild(slMark);
  }
  /* hit area — invisible circle, pointer-events:all */
  const hit=document.createElementNS(ns,'circle');
  hit.setAttribute('cx','0');hit.setAttribute('cy','-3');hit.setAttribute('r','5');
  hit.setAttribute('fill','rgba(0,0,0,0.001)');hit.setAttribute('pointer-events','all');
  g.appendChild(hit);
  /* click on g */
  g.addEventListener('click',e=>{
    e.stopPropagation();
    const _now=Date.now();if(_now-_lastClickMs<350)return;_lastClickMs=_now;
    _pinClicked=true;
    if(stickyTip===key){hideTip();stickyTip=null;activeRegion=null;renderSidebar();setActivePinClass(null);return;}
    showTip(e,r,p);stickyTip=key;makeTipSticky();setActivePinClass(key);
    activeRegion=r.id;renderSidebar();
  });
  hit.addEventListener('mouseenter',e=>{if(stickyTip!==key)showTip(e,r,p);});
  hit.addEventListener('mouseleave',()=>{if(stickyTip!==key)hideTip();});
  g.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();moveTo(VW/2-mx*4.5,VH/2-my*4.5,4.5,true);}});
  return g;
}
function computeOverlaps(entries){
  /* Group only by REGION ID — same lat/lng gets a small radial spread.
     Geographically distinct regions stay at their geographic positions. */
  const SPREAD=5;
  groupOf={};renderPos={};
  const byRegion={};
  entries.forEach(e=>{
    if(!byRegion[e.r.id])byRegion[e.r.id]=[];
    byRegion[e.r.id].push(e);
  });
  Object.values(byRegion).forEach(grp=>{
    if(grp.length<2)return;
    grp.forEach(e=>{groupOf[e.key]=grp;});
    const[cx,cy]=project([grp[0].r.lng,grp[0].r.lat]);
    const step=(2*Math.PI)/grp.length;
    grp.forEach((e,k)=>{
      const a=-Math.PI/2+k*step;
      renderPos[e.key]=[cx+Math.cos(a)*SPREAD,cy+Math.sin(a)*SPREAD];
    });
  });
}
function renderMarkers(){
  marksG.innerHTML='';
  if(expandedCluster===null)return;
  const cl=CLUSTERS.find(x=>x.id===expandedCluster);if(!cl)return;
  const entries=[];
  filteredRegions().filter(r=>cl.regions.includes(r.id)).forEach(r=>{
    r.p.forEach(p=>entries.push({r,p,key:r.id+'|'+p}));
  });
  computeOverlaps(entries);
  entries.forEach((entry,i)=>{
    const m=makeMarker(entry.r,entry.p,entry.key);
    m.style.animation=`svgPinIn .35s ease-out ${i*0.05}s both`;
    marksG.appendChild(m);
  });
}

/* ── Tooltip ── */
function showTip(e,r,p){
  const city=(r.name.match(/\(([^)]+)\)/)||[,r.name])[1];
  const rid=r.name.replace(/\s*\(.*\)/,'').trim();
  const chip='<span class="tip-pchip"><span class="tip-pdot" style="background:'+PROVIDERS[p].color+'"></span>'+PROVIDERS[p].short+'</span>';
  const sl=r.sl?'<span class="tip-sl-badge">serverless</span>':'';
  tipEl.innerHTML=
    '<div class="tip-head">'+
      '<div class="tip-city"><span style="width:9px;height:9px;border-radius:50%;background:'+PROVIDERS[p].color+';flex-shrink:0;display:inline-block"></span>'+
      '<span class="tip-city-name">'+city+'</span>'+sl+'</div>'+
      '<button class="tip-close" onclick="hideTip();stickyTip=null;activeRegion=null;renderSidebar();setActivePinClass(null)">×</button>'+
    '</div>'+
    '<div class="tip-region">'+rid+'</div>'+
    '<div class="tip-body">'+
      '<hr class="tip-divider">'+
      '<div class="tip-row"><span class="tip-row-label">Provider</span><span class="tip-row-val">'+chip+'</span></div>'+
      '<div class="tip-row"><span class="tip-row-label">Type</span><span class="tip-row-val">'+(r.sl?'Serverless':'Hosted')+'</span></div>'+
      '<div class="tip-row"><span class="tip-row-label">Geo</span><span class="tip-row-val">'+r.geo.charAt(0).toUpperCase()+r.geo.slice(1)+'</span></div>'+
    '</div>';
  tipEl.style.display='block';
  /* sticky class enables pointer-events (needed for X button) */
  if(stickyTip)tipEl.classList.add('sticky');else tipEl.classList.remove('sticky');
  const rect=mapWrap.getBoundingClientRect();
  let lx=e.clientX-rect.left+18,ly=e.clientY-rect.top-20;
  if(lx+228>rect.width)lx=e.clientX-rect.left-232;
  if(ly+160>rect.height)ly=e.clientY-rect.top-165;
  if(ly<4)ly=4;
  tipEl.style.left=lx+'px';tipEl.style.top=ly+'px';
}
function hideTip(){tipEl.style.display='none';tipEl.classList.remove('sticky');setActivePinClass(null);}
function makeTipSticky(){tipEl.classList.add('sticky');}

/* ── Zoom to region ── */
function zoomTo(r,mx,my){
  if(expandedCluster){
    // in cluster view: zoom to fixed level so it doesn't accumulate
    const sc=5.0;
    moveTo(VW/2-mx*sc,VH/2-my*sc,sc,true);
    activeRegion=r.id;renderSidebar();
    const fp=r.p[0];
    if(fp){const k=r.id+'|'+fp;setActivePinClass(k);stickyTip=null;}
  }else{
    moveTo(VW/2-mx*2.5,VH/2-my*2.5,2.5,true);
    activeRegion=r.id;renderSidebar();
  }
}

/* ── Sidebar ── */
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  const byP={aws:[],gcp:[],azure:[]};
  /* in expanded cluster view, only show that cluster's regions */
  let regions=filteredRegions();
  if(expandedCluster){
    const cl=CLUSTERS.find(x=>x.id===expandedCluster);
    if(cl)regions=regions.filter(r=>cl.regions.includes(r.id));
  }
  regions.forEach(r=>r.p.forEach(p=>{if(!byP[p].find(x=>x.id===r.id))byP[p].push(r);}));
  sb.innerHTML='';
  ['aws','gcp','azure'].forEach(p=>{
    if(!byP[p].length)return;
    const grp=document.createElement('div');grp.className='acc-group';
    const head=document.createElement('button');head.className='acc-head';
    const body=document.createElement('div');body.className='acc-body open';
    head.setAttribute('aria-expanded','true');
    head.innerHTML='<span style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:'+PROVIDERS[p].color+';flex-shrink:0"></span>'+PROVIDERS[p].label+'</span><span class="acc-chevron open" aria-hidden="true">&#8964;</span>';
    byP[p].forEach(r=>{
      const row=document.createElement('div');
      row.className='region-row'+(r.id===activeRegion?' active':'');
      if(r.id===activeRegion)setTimeout(()=>row.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
      row.setAttribute('role','button');
      row.setAttribute('tabindex','0');
      row.setAttribute('aria-label',r.name+(r.sl?' (serverless)':''));
      row.innerHTML='<span class="rdot" style="background:'+PROVIDERS[p].color+'" aria-hidden="true"></span><span>'+r.name+'</span>'+(r.sl?'<span class="stag">serverless</span>':'');
      const[mx,my]=project([r.lng,r.lat]);
      row.addEventListener('click',()=>zoomTo(r,mx,my));
      row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();zoomTo(r,mx,my);}});
      body.appendChild(row);
    });
    head.addEventListener('click',()=>{
      const open=body.classList.toggle('open');
      head.querySelector('.acc-chevron').classList.toggle('open',open);
      head.setAttribute('aria-expanded',open?'true':'false');
    });
    grp.appendChild(head);grp.appendChild(body);sb.appendChild(grp);
  });
}

/* ── Tabs ── */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>{x.classList.remove('on');x.setAttribute('aria-selected','false');});
  t.classList.add('on');t.setAttribute('aria-selected','true');
  activeTab=t.dataset.tab;activeRegion=null;hideTip();
  expandedCluster=null;stickyTip=null;hideTip();
  document.getElementById('back-btn').style.display='none';
  flyTo(activeTab);renderMarkers();renderSidebar();renderClusterLayer();
}));

/* ── Checkboxes ── */
document.getElementById('chk-sl').addEventListener('change',e=>{showSL=e.target.checked;renderMarkers();renderSidebar();});
document.getElementById('chk-ho').addEventListener('change',e=>{showHosted=e.target.checked;renderMarkers();renderSidebar();});

/* ── View toggle ── */

/* ── Zoom buttons ── */
function zoomAround(f){
  const cx=VW/2,cy=VH/2,wx=(cx-curTx)/curSc,wy=(cy-curTy)/curSc;
  const ns=Math.max(0.5,Math.min(8,curSc*f));
  moveTo(cx-wx*ns,cy-wy*ns,ns,true);
}
document.getElementById('zi').addEventListener('click',()=>zoomAround(1.4));
document.getElementById('zo').addEventListener('click',()=>zoomAround(1/1.4));

/* ── Drag ── */
svg.addEventListener('pointerdown',e=>{
  if(marksG.contains(e.target))return;
  svg.setPointerCapture(e.pointerId);
  dragStart=svgPt(e);dragTxO=curTx;dragTyO=curTy;wasDragging=false;
  svg.classList.add('drag');
});
svg.addEventListener('pointermove',e=>{
  if(!dragStart)return;
  const[px,py]=svgPt(e),dx=px-dragStart[0],dy=py-dragStart[1];
  if(Math.abs(dx)>2||Math.abs(dy)>2)wasDragging=true;
  moveTo(dragTxO+dx,dragTyO+dy,curSc,false);
});
svg.addEventListener('pointerup',()=>{dragStart=null;svg.classList.remove('drag');setTimeout(()=>{wasDragging=false;},50);});

/* ── Click background → clear sticky tooltip ── */
svg.addEventListener('click',e=>{
  /* ignore if click was anywhere inside the markers layer */
  if(e.composedPath().some(el=>el===marksG))return;
  if(expandedCluster!==null){collapseToGlobal();}else{hideTip();stickyTip=null;}
});

/* ── Scroll zoom ── */
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const[mx,my]=svgPt(e),wx=(mx-curTx)/curSc,wy=(my-curTy)/curSc;
  const ns=Math.max(0.5,Math.min(8,curSc*(e.deltaY>0?0.85:1.18)));
  moveTo(mx-wx*ns,my-wy*ns,ns,false);
},{passive:false});

/* ── Init ── */
flyTo('global');
renderMarkers();
renderSidebar();
setTimeout(renderClusterLayer,50);
document.getElementById('back-btn').addEventListener('click',collapseToGlobal);
</script>
